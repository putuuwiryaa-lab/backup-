name: Auto Scraper

on:
  schedule:
    - cron: '17 5,11,17,23 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests supabase

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scraper_with_predictions.py

      - name: Run rekap line evaluator
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANALYZE_API_URL: https://analisaangka.online/api/analyze
          INTERNAL_API_SECRET: ${{ secrets.INTERNAL_API_SECRET }}
        run: python rekap_line_evaluator.py

      - name: Run analysis evaluator
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANALYZE_API_URL: https://analisaangka.online/api/analyze
          INTERNAL_API_SECRET: ${{ secrets.INTERNAL_API_SECRET }}
        run: python analysis_evaluator.py
