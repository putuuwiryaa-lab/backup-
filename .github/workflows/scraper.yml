name: Auto Scraper

on:
  schedule:
    - cron: '0 */12 * * *'  # setiap 12 jam
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Scraper
        run: |
          curl -X GET \
            -H "x-scraper-secret: ${{ secrets.SCRAPER_SECRET }}" \
            https://analisaangka.online/api/scraper
