name: Diagnose Vercel Build

on:
  pull_request:
    branches: [main]

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run diagnostics
        run: |
          mkdir -p diagnostics
          set +e

          python - <<'PY' > diagnostics/paths.log 2>&1
          from pathlib import Path
          from collections import defaultdict

          root = Path('api')
          paths = []
          for path in root.rglob('*'):
              if path.is_file():
                  relative = path.as_posix()
                  suffixless = path.with_suffix('').as_posix() if path.suffix else relative
                  paths.append((relative, suffixless.casefold()))

          groups = defaultdict(list)
          for original, normalized in paths:
              groups[normalized].append(original)

          conflicts = {key: values for key, values in groups.items() if len(values) > 1}
          print('API_FILES_BEGIN')
          for original, normalized in sorted(paths):
              print(f'{original} -> {normalized}')
          print('API_FILES_END')
          if conflicts:
              print('VERCEL_PATH_CONFLICTS_BEGIN')
              for key, values in sorted(conflicts.items()):
                  print(f'{key}: {values}')
              print('VERCEL_PATH_CONFLICTS_END')
              raise SystemExit(1)
          print(f'VERCEL_PATH_CONFLICTS=0 files={len(paths)}')
          PY
          echo $? > diagnostics/paths.exit

          npm run lint > diagnostics/tsc.log 2>&1
          echo $? > diagnostics/tsc.exit

          npm run build > diagnostics/vite.log 2>&1
          echo $? > diagnostics/vite.exit

          npx --yes vercel@56.5.0 build --yes > diagnostics/vercel.log 2>&1
          echo $? > diagnostics/vercel.exit

          exit 0

      - name: Upload diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: vercel-cli-diagnostics
          path: diagnostics

      - name: Report diagnostic status
        run: |
          cat diagnostics/paths.log
          cat diagnostics/tsc.log
          cat diagnostics/vite.log
          cat diagnostics/vercel.log
          echo "paths=$(cat diagnostics/paths.exit)"
          echo "tsc=$(cat diagnostics/tsc.exit)"
          echo "vite=$(cat diagnostics/vite.exit)"
          echo "vercel=$(cat diagnostics/vercel.exit)"
          test "$(cat diagnostics/paths.exit)" = "0"
          test "$(cat diagnostics/tsc.exit)" = "0"
          test "$(cat diagnostics/vite.exit)" = "0"
          test "$(cat diagnostics/vercel.exit)" = "0"
