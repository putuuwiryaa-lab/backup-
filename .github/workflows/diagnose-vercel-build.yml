name: Diagnose Vercel Build

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Detect Vercel path conflicts
        run: |
          mkdir -p diagnostics
          python - <<'PY' > diagnostics/paths.log 2>&1
          from pathlib import Path
          from collections import defaultdict

          root = Path('api')
          paths = []
          for path in root.rglob('*'):
              if path.is_file():
                  relative = path.as_posix()
                  suffixless = path.with_suffix('').as_posix() if path.suffix else relative
                  paths.append((relative, suffixless.casefold()))

          groups = defaultdict(list)
          for original, normalized in paths:
              groups[normalized].append(original)

          conflicts = {key: values for key, values in groups.items() if len(values) > 1}
          if conflicts:
              print('VERCEL_PATH_CONFLICTS_BEGIN')
              for key, values in sorted(conflicts.items()):
                  print(f'{key}: {values}')
              print('VERCEL_PATH_CONFLICTS_END')
              raise SystemExit(1)

          print(f'VERCEL_PATH_CONFLICTS=0 files={len(paths)}')
          PY
          echo $? > diagnostics/paths.exit

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Generate frontend type fix
        run: |
          npm install --save-dev @types/react@^19.0.0 @types/react-dom@^19.0.0
          printf '%s\n' '/// <reference types="vite/client" />' > src/vite-env.d.ts

      - name: TypeScript check
        run: |
          set +e
          npm run lint > diagnostics/tsc.log 2>&1
          echo $? > diagnostics/tsc.exit
          exit 0

      - name: Vite build
        run: |
          set +e
          npm run build > diagnostics/vite.log 2>&1
          echo $? > diagnostics/vite.exit
          exit 0

      - name: Fail on diagnostic errors
        run: |
          cat diagnostics/paths.log
          cat diagnostics/tsc.log
          cat diagnostics/vite.log
          test "$(cat diagnostics/paths.exit)" = "0"
          test "$(cat diagnostics/tsc.exit)" = "0"
          test "$(cat diagnostics/vite.exit)" = "0"

      - name: Persist generated type fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json src/vite-env.d.ts
          if git diff --cached --quiet; then
            echo "Generated type fix already committed"
          else
            git commit -m "fix: add frontend type declarations"
            git push origin HEAD:${{ github.head_ref }}
          fi
