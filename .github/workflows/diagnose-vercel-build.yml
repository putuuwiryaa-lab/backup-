name: Diagnose Vercel Build

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  migrate-and-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Move API utilities outside route directory
        run: |
          mkdir -p server

          if [ -d api/engines ]; then
            git mv api/engines server/engines
          fi

          if [ -f api/predictionEngine.ts ]; then
            git mv api/predictionEngine.ts server/predictionEngine.ts
          fi

          python - <<'PY'
          from pathlib import Path

          path = Path('api/analyze.ts')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              'from "./predictionEngine.js"',
              'from "../server/predictionEngine.js"',
          )
          path.write_text(text, encoding='utf-8')
          PY

          echo "API function entries:"
          find api -type f -maxdepth 2 | sort

          python - <<'PY'
          from pathlib import Path

          expected = {
              'api/admin.ts',
              'api/analyze.ts',
              'api/auth.ts',
              'api/markets.ts',
              'api/trial.ts',
              'api/verify.ts',
          }
          actual = {path.as_posix() for path in Path('api').rglob('*') if path.is_file()}
          unexpected = sorted(actual - expected)
          missing = sorted(expected - actual)
          if unexpected or missing:
              raise SystemExit(f'Invalid API layout: unexpected={unexpected} missing={missing}')
          print('API_LAYOUT_OK=6 handlers')
          PY

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run lint

      - name: Vite build
        run: npm run build

      - name: Persist validated API layout
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add api server
          if git diff --cached --quiet; then
            echo "API utilities already migrated"
          else
            git commit -m "fix: move API utilities outside Vercel routes"
            git push origin HEAD:${{ github.head_ref }}
          fi
